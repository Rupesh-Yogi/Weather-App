<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="icon" href="/Resources/favicon.webp">
    <link rel="stylesheet" href="index.css">
    <script src="/index.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>


<body>

    <header>
        <div class="leftHeader">
            <img src="/logo.webp" alt="Logo of Cloud" style="width: 85px; height: 85px;">
            <h1>Weather App</h1>
        </div>

        <div class="midHeader">
            <nav>
                <ul>
                    <li>About</li>
                    <li>Home</li>
                    <li>Favourites</li>
                    <li>Contact</li>
                </ul>
            </nav>
        </div>


        <div class="rightHeader">
            <button class="dark_mode"><i class="fa-solid fa-moon "></i></button>
            <i class="fa-solid fa-user profile"></i>
            <button class="menu_icon">☰</button>
        </div>

    </header>

    <main class="Home">
        <div class="search">
            <input type="text" placeholder="Search Places here">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>

        <div class="display">

            <div class="degree">
                <div class="number">
                    <p class="placeName">Sydney, Australia</p>
                    <h1>26&deg</h1>
                    <p>Sunny, Feels 25&deg</p>
                </div>

                <div class="cloudImage">
                    <figure> <img src="/Resources/Display_cloud.png" alt="Icon of Cloud">
                        <figcaption>starned &hearts;</figcaption>
                    </figure>
                </div>

                <div class="sunImage">
                    <img src="/Resources/display_sun.png" alt="Icon of Sun">
                </div>
            </div>

            <div class="humidity">
                <i class="fa-solid fa-droplet"></i>
                <p>Humidity</p>
                <h2>48%</h2>
            </div>

            <div class="wind">
                <i class="fa-solid fa-wind"></i>
                <p>Wind Speed</p>
                <h2>6.3 m/s</h2>
            </div>

            <div class="pressure">
                <i class="fa-solid fa-gauge"></i>
                <p>Pressure</p>
                <h2>1013 hPa</h2>
            </div>

            <div class="UV">
                <i class="fa-solid fa-sun"></i>
                <p>UV Index</p>
                <h2>High 7</h2>
            </div>
        </div>

        <footer class="footer">
            <nav>
                <ul>
                    <li>&#169; Weather App</li>
                    <li>Built by <a href="#">Rupesh Yogi</a></li>
                    <li class="socialLinks">
                        <a href="#">Github</a>
                        <span class="separator">|</span>
                        <a href="#">Linkedin</a>
                    </li>

                </ul>
            </nav>
        </footer>
    </main>
</body>

</html>
