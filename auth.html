<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="auth.css">
    <link rel="icon" href="Resources\favicon.webp">
    <!-- <script src="common.js" defer></script> -->
</head>

<body>

    <div class="authContainer">

        <div class="loginForm">

            <div class="authTop">

                <div class="loginIcon">
                    <i class="fa-solid fa-right-to-bracket fa-flip-horizontal openBracket"></i>
                </div>

                <div class="loginText">
                    <h2>Login</h2>
                    <p>Welcome back! Please login to continue.</p>
                </div>

            </div>

            <div class="authFields">
                <label for="email">Email</label>
                <input class="authInput" type="text" required placeholder="Enter your email"
                    data-error="Please enter your email" data-error-id="loginEmailError">

                <label for="password">Password</label>
                <input class="authInput" type="password" required data-error="Please enter your password"
                    data-error-id="loginPasswordError" placeholder="Enter your password">

            </div>

            <button class="loginBtn">
                <i class="fa-solid fa-right-to-bracket"></i>
                <p>Login</p>
            </button>
        </div>

        <div class="registerForm">
            <p>Don't have account? <a href="">Register here</a></p>
        </div>

    </div>

</body>

</html>
