<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="auth.css">
    <link rel="icon" href="Resources\favicon.webp">
    <!-- <script src="common.js" defer></script> -->
    <script src="auth.js" defer></script>
</head>

<body>

    <div class="authContainer">

        <!-- login Form -->

        <div class="loginForm">

            <div class="authTop">

                <div class="loginIcon">
                    <i class="fa-solid fa-right-to-bracket fa-flip-horizontal openBracket"></i>
                </div>

                <div class="loginText">
                    <h2>Login</h2>
                    <p>Welcome back! Please login to continue.</p>
                </div>

            </div>

            <div class="authFields">
                <label for="logEmail">Email</label>
                <input id="logEmail" class="authInput loginInput" type="email" required placeholder="Enter your email"
                    data-login-error="Please enter your email" data-login-error-id="loginEmailError">
                <p class="error" id="loginEmailError"></p>


                <label for="logPassword">Password</label>
                <input id="logPassword" class="authInput loginInput" type="password" required
                    data-login-error="Please enter your password" data-login-error-id="loginPasswordError"
                    placeholder="Enter your password">
                <p class="error" id="loginPasswordError"></p>

            </div>

            <button class="loginBtn" id="loginBtn">
                <i class="fa-solid fa-right-to-bracket"></i>
                <p>Login</p>
            </button>

            <div class="registerText">
                <p>Don't have account?
                    <span class="goToRegister">Register here</span>
                </p>
            </div>
        </div>

        <!-- Register Form -->

        <div class="registerForm" style="display: none;">
            <!-- <div class="registerForm">         -->

            <div class="authTop">
                <div class="registerIcon">
                    <i class="fa-solid fa-user-plus openBracket"></i>
                </div>

                <div class="goToRegisterText">
                    <h2>Register</h2>
                    <p>Create your account to get started.</p>
                </div>
            </div>

            <div class="authFields">
                <label for="registerEmail">Email</label>
                <input id="registerEmail" class="authInput registerInput" type="email" required
                    data-register-error-id="regEmailError" placeholder="Enter your email"
                    data-register-error="Please enter your email">
                <p class="error" id="regEmailError"></p>

                <label for="registerPassword">Password</label>
                <input id="registerPassword" class="authInput registerInput" type="password" required
                    placeholder="Create a password" data-register-error="Please create your password"
                    data-register-error-id="regPassError">
                <p class="error" id="regPassError"></p>
            </div>

            <button class="loginBtn" id="registerBtn">
                <i class="fa-solid fa-user-plus "></i>
                <p>Register</p>
            </button>

            <div class="toggleForm">
                <p>Already have an account?
                    <span id="goToLogin" class="goToLogin">Login here</span>
                </p>

            </div>
        </div>



    </div>

</body>

</html>
