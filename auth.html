<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="auth.css">
</head>

<body>

    <div class="authContainer">

        <div class="loginForm">
            <div class="authTop">
                
                <section class="loginIcon">
                    <i class="fa-solid fa-right-to-bracket fa-flip-horizontal"></i>
                </section>

                <section class="loginText">
                    <h2>Login</h2>
                    <p>Welcome back! Please login to continue.</p>
                </section>

            </div>

            <div class="authFields">
                <label for="email">Email</label>
                <input class="authInput" type="text" required placeholder="Enter your email"
                    data-error="Please enter your email" data-error-id="loginEmailError">
            </div>
        </div>

        <div class="registerForm">

        </div>

    </div>

</body>

</html>
