<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="form.css">
    <link rel="icon" href="Resources\favicon.webp">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="common.js" defer></script>
</head>

<body>

    <header class="header"></header>

    <section class="formHero">Contact Us</section>

    <main class="formContent">
        <div class="formDetails">
            <label for="name">Name</label>
            <input id="name" type="text" placeholder="Enter your name" required>

            <label for="email">Email</label>
            <input id="email" type="text" placeholder="Enter your Email" required>

            <label for="message">Message</label>
            <textarea name="text" id="message" placeholder="leave a message"></textarea>

        </div>

        <div class="formSubmit">
            <button type="submit">Send Message</button>
        </div>

    </main>

    <footer class="footer"></footer>

</body>

</html>
